<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>한걸음 게시판 - 상세 보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 700px; margin-top: 50px; }
        .content-box { min-height: 200px; background-color: #f8f9fa; padding: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="py-5 text-center">
        <h2>게시글 상세 보기</h2>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label fw-bold">제목</label>
            <div class="form-control-plaintext fs-4" th:text="${board.title}">게시글 제목</div>
        </div>
        <div class="col-md-3">
            <label class="form-label fw-bold">작성자</label>
            <div class="form-control-plaintext" th:text="${board.writer}">홍길동</div>
        </div>
        <div class="col-md-3">
            <label class="form-label fw-bold">조회수</label>
            <div><span class="badge bg-info text-dark fs-6" th:text="${board.viewCount}">0</span></div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col">
            <label class="form-label fw-bold">작성일시</label>
            <div class="form-control-plaintext text-muted"
                 th:text="${#temporals.format(board.regDate, 'yyyy-MM-dd HH:mm:ss')}">2026-07-12 18:00:00</div>
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">내용</label>
        <div class="content-box" th:text="${board.content}">게시글 본문 내용이 들어갑니다.</div>
    </div>

    <hr class="my-4">

    <div class="d-flex justify-content-between">
        <a th:href="@{/boards}" class="btn btn-secondary btn-lg">목록으로</a>
        <div>
            <a th:href="@{/boards/{id}/edit(id=${board.id})}" class="btn btn-warning btn-lg me-2">수정하기</a>

            <a th:href="@{/boards/{id}/delete(id=${board.id})}"
               th:onclick="return confirm('정말 삭제하시겠습니까?')"
               class="btn btn-danger btn-lg">삭제하기</a>
        </div>
    </div>
</div>

</body>
</html>
