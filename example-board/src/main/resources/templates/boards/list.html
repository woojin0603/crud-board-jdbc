<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>한걸음 게시판 - 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 800px; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="py-5 text-center">
        <h2>게시글 목록</h2>
    </div>

    <div class="row">
        <div class="col">
            <button class="btn btn-primary float-end mb-3"
                    th:onclick="|location.href='@{/boards/add}'|" type="button">글쓰기</button>
        </div>
    </div>

    <table class="table table-striped table-hover text-center">
        <thead>
        <tr>
            <th style="width: 10%">ID</th>
            <th style="width: 50%">제목</th>
            <th style="width: 15%">작성자</th>
            <th style="width: 15%">작성일</th>
            <th style="width: 10%">조회수</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board : ${boards}">
            <td th:text="${board.id}">1</td>
            <td class="text-start">
                <a th:href="@{/boards/{boardId}(boardId=${board.id})}"
                   th:text="${board.title}">게시글 제목입니다.</a>
            </td>
            <td th:text="${board.writer}">홍길동</td>
            <td th:text="${#temporals.format(board.regDate, 'yyyy-MM-dd')}">2026-07-12</td>
            <td><span class="badge bg-secondary" th:text="${board.viewCount}">0</span></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
