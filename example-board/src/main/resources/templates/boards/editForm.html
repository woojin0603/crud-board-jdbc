<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>한걸음 게시판 - 글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 600px; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="py-5 text-center">
        <h2>게시글 수정</h2>
    </div>

    <form th:action method="post">
        <div class="mb-3">
            <label for="id" class="form-label">글 번호</label>
            <input type="text" id="id" name="id" class="form-control" th:value="${board.id}" readonly>
        </div>

        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input type="text" id="title" name="title" class="form-control" th:value="${board.title}" required>
        </div>

        <div class="mb-3">
            <label for="writer" class="form-label">작성자</label>
            <input type="text" id="writer" name="writer" class="form-control" th:value="${board.writer}" readonly>
        </div>

        <div class="mb-3">
            <label for="content" class="form-label">내용</label>
            <textarea id="content" name="content" rows="5" class="form-control" th:text="${board.content}" required></textarea>
        </div>

        <hr class="my-4">

        <div class="row">
            <div class="col">
                <button class="w-100 btn btn-success btn-lg" type="submit">수정 완료</button>
            </div>
            <div class="col">
                <a th:href="@{/boards/{id}(id=${board.id})}" class="w-100 btn btn-secondary btn-lg text-center" style="line-height: 2;">취소</a>
            </div>
        </div>
    </form>
</div>

</body>
</html>
